<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Slice - Evolutionary Fish Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1628;
        }

        canvas {
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1e3a5f;
            color: #e2e8f0;
            min-width: 280px;
            max-height: 90vh;
            overflow-y: auto;
            font-size: 12px;
        }

        #ui-panel h1 {
            font-size: 16px;
            color: #38bdf8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #ui-panel h2 {
            font-size: 11px;
            color: #94a3b8;
            margin: 12px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 1px solid #1e3a5f;
            padding-top: 8px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .control-row label {
            flex: 1;
        }

        .control-row span {
            width: 40px;
            text-align: right;
            color: #38bdf8;
        }

        input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        input[type="text"] {
            width: 120px;
            padding: 4px 8px;
            background: #1e3a5f;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #e2e8f0;
        }

        button {
            padding: 6px 12px;
            background: #1e3a5f;
            border: 1px solid #38bdf8;
            border-radius: 4px;
            color: #38bdf8;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        button:hover {
            background: #38bdf8;
            color: #0a1628;
        }

        .toggle-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }

        .toggle-btn {
            padding: 4px 8px;
            font-size: 10px;
        }

        .toggle-btn.active {
            background: #38bdf8;
            color: #0a1628;
        }

        #stats-panel {
            margin-top: 8px;
            padding: 8px;
            background: rgba(30, 58, 95, 0.5);
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
        }

        #stats-panel div {
            margin-bottom: 2px;
        }

        .stat-label {
            color: #94a3b8;
        }

        .stat-value {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="ui-panel">
        <h1>Ocean Slice</h1>

        <div class="control-row">
            <label>Seed</label>
            <input type="text" id="seed-input" value="ocean-001">
            <button id="regen-btn">Regen</button>
        </div>

        <h2>Boid Weights</h2>
        <div class="control-row">
            <label>Separation</label>
            <input type="range" id="sep-weight" min="0" max="3" step="0.1" value="1.5">
            <span id="sep-val">1.5</span>
        </div>
        <div class="control-row">
            <label>Alignment</label>
            <input type="range" id="ali-weight" min="0" max="3" step="0.1" value="1.0">
            <span id="ali-val">1.0</span>
        </div>
        <div class="control-row">
            <label>Cohesion</label>
            <input type="range" id="coh-weight" min="0" max="3" step="0.1" value="1.0">
            <span id="coh-val">1.0</span>
        </div>

        <h2>Simulation</h2>
        <div class="control-row">
            <label>Sim Speed</label>
            <input type="range" id="sim-speed" min="0.1" max="3" step="0.1" value="1.0">
            <span id="speed-val">1.0</span>
        </div>
        <div class="control-row">
            <label>Mutation Rate</label>
            <input type="range" id="mutation-rate" min="0" max="0.5" step="0.01" value="0.1">
            <span id="mut-val">0.10</span>
        </div>
        <div class="control-row">
            <label>Fish Scale</label>
            <input type="range" id="fish-scale" min="0.25" max="2" step="0.25" value="1.0">
            <span id="scale-val">1.0</span>
        </div>

        <h2>Toggles</h2>
        <div class="toggle-row">
            <button id="debug-toggle" class="toggle-btn">Debug</button>
            <button id="fps-toggle" class="toggle-btn active">FPS</button>
            <button id="lowq-toggle" class="toggle-btn">Low-Q</button>
        </div>

        <h2>Stats</h2>
        <div id="stats-panel">
            <div><span class="stat-label">FPS:</span> <span class="stat-value" id="fps-stat">60</span></div>
            <div><span class="stat-label">Avg FPS (5s):</span> <span class="stat-value" id="avgfps-stat">60</span></div>
            <div><span class="stat-label">Prey:</span> <span class="stat-value" id="prey-stat">0</span></div>
            <div><span class="stat-label">Predators:</span> <span class="stat-value" id="pred-stat">0</span></div>
            <div><span class="stat-label">Avg Speed:</span> <span class="stat-value" id="avgspeed-stat">0</span></div>
            <div><span class="stat-label">Avg Vision:</span> <span class="stat-value" id="avgvision-stat">0</span></div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
